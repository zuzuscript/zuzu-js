<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>ZuzuScript Compiled Browser GUI Demo</title>
	<style>
		:root {
			font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			color: #18202a;
			background: #eef1f5;
		}

		body {
			margin: 0;
			min-height: 100vh;
		}

		main {
			box-sizing: border-box;
			max-width: 760px;
			padding: 32px;
		}

		h1 {
			margin: 0 0 10px;
			font-size: 28px;
			letter-spacing: 0;
		}

		p {
			margin: 0;
			color: #526071;
			line-height: 1.5;
		}
	</style>
</head>
<body>
	<main>
		<h1>ZuzuScript Compiled Browser GUI Demo</h1>
		<p>
			This page loads a JavaScript file compiled from
			browser-gui-compiled-demo.zzs. GUI event output is written to
			the normal browser console.
		</p>
	</main>
	<script src="browser-gui-compiled-demo.js"></script>
</body>
</html>
